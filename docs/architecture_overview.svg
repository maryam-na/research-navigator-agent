<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ResearchNavigator Agent Architecture</title>
  <desc id="desc">A clean local-first architecture diagram showing local papers, deterministic processing tools, ADK and MCP wrappers, Streamlit review, and safety evaluation.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .card { fill: #ffffff; stroke: #d8dee8; stroke-width: 2; }
      .data { fill: #e8f3ff; stroke: #9cc7f2; stroke-width: 2; }
      .tool { fill: #ecfdf5; stroke: #8dd8c0; stroke-width: 2; }
      .agent { fill: #f3efff; stroke: #b9a7ef; stroke-width: 2; }
      .review { fill: #fff7ed; stroke: #f2c38d; stroke-width: 2; }
      .safety { fill: #fffbea; stroke: #e6c86e; stroke-width: 2; }
      .title { fill: #111827; font: 700 44px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #475569; font: 500 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #111827; font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #475569; font: 500 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { fill: #334155; font: 600 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .soft-arrow { fill: none; stroke: #8a94a6; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 8; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900" />
  <text class="title" x="80" y="80">ResearchNavigator Agent</text>
  <text class="subtitle" x="80" y="118">Local-first research discovery with ADK-facing orchestration and MCP-ready local tools</text>

  <rect class="card" x="70" y="155" width="1460" height="610" rx="24" />

  <rect class="data" x="115" y="255" width="260" height="150" rx="18" />
  <text class="label" x="145" y="305">Local Papers</text>
  <text class="body" x="145" y="342">Permitted PDFs</text>
  <text class="body" x="145" y="370">Local manifest</text>

  <rect class="tool" x="455" y="255" width="300" height="150" rx="18" />
  <text class="label" x="485" y="305">Evidence Pipeline</text>
  <text class="body" x="485" y="342">Parse, chunk, extract</text>
  <text class="body" x="485" y="370">SQLite statement store</text>

  <rect class="tool" x="835" y="255" width="300" height="150" rx="18" />
  <text class="label" x="865" y="305">Discovery Engine</text>
  <text class="body" x="865" y="342">NetworkX graph</text>
  <text class="body" x="865" y="370">Gaps and hypotheses</text>

  <rect class="review" x="1215" y="255" width="260" height="150" rx="18" />
  <text class="label" x="1245" y="305">Review App</text>
  <text class="body" x="1245" y="342">Search, evidence</text>
  <text class="body" x="1245" y="370">Graph and scores</text>

  <path class="arrow" d="M 385 330 L 443 330" />
  <path class="arrow" d="M 765 330 L 823 330" />
  <path class="arrow" d="M 1145 330 L 1203 330" />

  <rect class="agent" x="245" y="500" width="390" height="135" rx="18" />
  <text class="label" x="275" y="548">ADK-Facing Agent</text>
  <text class="body" x="275" y="584">Root wrapper and tool manifest</text>
  <text class="body" x="275" y="612">Planned trajectory and final contract</text>

  <rect class="agent" x="710" y="500" width="320" height="135" rx="18" />
  <text class="label" x="740" y="548">Local MCP Server</text>
  <text class="body" x="740" y="584">Selected bounded tools</text>
  <text class="body" x="740" y="612">Same safety model</text>

  <rect class="safety" x="1105" y="500" width="320" height="135" rx="18" />
  <text class="label" x="1135" y="548">Safety Checks</text>
  <text class="body" x="1135" y="584">Policy, grounding, citations</text>
  <text class="body" x="1135" y="612">Human review boundaries</text>

  <path class="soft-arrow" d="M 440 492 C 500 445 560 425 605 410" />
  <path class="soft-arrow" d="M 870 492 C 900 450 940 425 985 410" />
  <path class="soft-arrow" d="M 1265 492 L 1345 417" />

  <rect class="card" x="270" y="690" width="1060" height="52" rx="16" />
  <text class="note" x="300" y="723">Traceable path: papers -> evidence IDs -> graph -> hypotheses -> safety review -> grounded brief</text>
</svg>
